<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kiosco Plaza Santa Bárbara</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111111;
    --surface: #1c1c1c;
    --surface2: #242424;
    --border: #2e2e2e;
    --primary: #DA291C;
    --primary-dark: #b71c1c;
    --accent: #FFC72C;
    --text: #ffffff;
    --text-secondary: #999999;
    --text-muted: #555555;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ── HEADER ── */
  header {
    background: #000;
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }
  .logo {
    font-size: 17px;
    font-weight: 900;
    letter-spacing: -0.3px;
    color: var(--text);
    text-transform: uppercase;
  }
  .logo span { color: var(--accent); }
  .cart-trigger {
    background: var(--primary);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 9px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background .15s;
    letter-spacing: 0.2px;
  }
  .cart-trigger:active { background: var(--primary-dark); }
  .cart-trigger svg { width: 18px; height: 18px; }
  .cart-badge {
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-weight: 800;
    border-radius: 50%;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR CATEGORIES ── */
  .sidebar {
    width: 100px;
    background: #000;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
    flex-shrink: 0;
    padding: 8px 0;
  }
  .sidebar::-webkit-scrollbar { display: none; }
  .cat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 14px 8px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .18s;
    text-align: center;
  }
  .cat-item:active { background: rgba(255,255,255,0.05); }
  .cat-item.active {
    border-left-color: var(--accent);
    background: rgba(255,199,44,0.07);
  }
  .cat-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    transition: all .18s;
    overflow: hidden;
  }
  .cat-item.active .cat-icon { background: var(--accent); }
  .cat-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .cat-name {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    line-height: 1.2;
  }
  .cat-item.active .cat-name { color: var(--accent); }

  /* ── PRODUCTS AREA ── */
  .products-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .products-area::-webkit-scrollbar { width: 4px; }
  .products-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .cat-section { padding: 20px 16px 8px; }
  .cat-section-title {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-secondary);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding-bottom: 100px;
  }

  .product-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: border-color .15s, transform .15s;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .product-card:active { transform: scale(0.97); }
  .product-card.in-cart { border-color: var(--accent); }

  .product-img-wrap {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--surface2);
    overflow: hidden;
    position: relative;
  }
  .product-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .product-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 42px;
    background: var(--surface2);
  }

  .product-body { padding: 10px 10px 12px; flex: 1; display: flex; flex-direction: column; }
  .product-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.35;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.2px;
  }
  .product-desc {
    font-size: 10px;
    color: var(--text-secondary);
    line-height: 1.4;
    margin-bottom: 8px;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .product-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
  }
  .product-price {
    font-size: 16px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .add-btn {
    width: 28px; height: 28px;
    background: var(--primary);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 20px;
    font-weight: 300;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    line-height: 1;
    transition: background .15s;
    flex-shrink: 0;
  }
  .add-btn:active { background: var(--primary-dark); }

  .in-cart-badge {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-weight: 800;
    border-radius: 50%;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── EMPTY STATE ── */
  .empty-menu {
    padding: 50px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--primary);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    z-index: 50;
    transform: translateY(100%);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
  }
  .bottom-bar.visible { transform: translateY(0); }
  .bottom-bar:active { background: var(--primary-dark); }
  .bb-left { display: flex; align-items: center; gap: 12px; }
  .bb-count {
    background: rgba(255,255,255,0.25);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 800;
  }
  .bb-label { font-size: 14px; font-weight: 700; letter-spacing: 0.3px; }
  .bb-total { font-size: 17px; font-weight: 900; letter-spacing: -0.3px; }

  /* ── CART DRAWER ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; }
  .overlay.show { display: block; }

  .cart-drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    z-index: 300;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    max-height: 88vh;
    display: flex;
    flex-direction: column;
  }
  .cart-drawer.show { transform: translateY(0); }

  .drawer-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }
  .drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .drawer-title {
    font-size: 16px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .drawer-close {
    background: var(--surface2);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .drawer-items { overflow-y: auto; flex: 1; }
  .cart-item {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }
  .ci-img {
    width: 52px; height: 52px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .ci-img img { width: 100%; height: 100%; object-fit: cover; }
  .ci-info { flex: 1; min-width: 0; }
  .ci-name {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2px;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ci-unit { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
  .ci-controls { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .ci-btn {
    width: 28px; height: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .ci-btn:active { background: var(--primary); border-color: var(--primary); }
  .ci-qty { font-size: 14px; font-weight: 800; min-width: 18px; text-align: center; }
  .ci-subtotal {
    font-size: 14px;
    font-weight: 800;
    color: var(--accent);
    min-width: 52px;
    text-align: right;
    flex-shrink: 0;
  }

  .empty-cart-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 50px 20px; gap: 10px;
    color: var(--text-muted);
  }
  .empty-cart-state svg { width: 48px; height: 48px; opacity: 0.3; }
  .empty-cart-state p { font-size: 14px; font-weight: 600; }

  .drawer-footer {
    padding: 16px 20px 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .total-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 14px;
  }
  .total-label { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
  .total-val { font-size: 26px; font-weight: 900; color: var(--accent); letter-spacing: -0.5px; }
  .confirm-btn {
    width: 100%;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 16px;
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    cursor: pointer;
    transition: background .15s;
  }
  .confirm-btn:active { background: var(--primary-dark); }
  .confirm-btn:disabled { opacity: 0.3; pointer-events: none; }

  /* ── SENDING ── */
  .sending-screen {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    backdrop-filter: blur(4px);
  }
  .sending-screen.show { display: flex; }
  .send-spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  .send-label { font-size: 15px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.3px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CONFIRMATION ── */
  .confirm-screen {
    display: none; position: fixed; inset: 0;
    background: var(--bg);
    z-index: 600;
    flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 40px 32px;
    gap: 0;
  }
  .confirm-screen.show { display: flex; }
  .confirm-icon {
    width: 80px; height: 80px;
    background: #1a2e1a;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
  }
  .confirm-icon svg { width: 40px; height: 40px; color: #4caf50; }
  .confirm-title {
    font-size: 24px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.3px;
    margin-bottom: 10px;
  }
  .confirm-sub {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 40px;
    max-width: 280px;
  }
  .new-order-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 16px 40px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    cursor: pointer;
  }
  .new-order-btn:active { background: var(--primary-dark); }

  /* ── LOADING ── */
  .loading-screen {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    color: var(--text-muted);
  }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  .loading-txt { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>

<header>
  <div class="logo">Kiosco <span>Santa Bárbara</span></div>
  <button class="cart-trigger" onclick="openCart()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    Mi pedido
    <span class="cart-badge" id="cartBadge">0</span>
  </button>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="products-area" id="productsArea">
    <div class="loading-screen" id="loadingScreen">
      <div class="loading-spinner"></div>
      <div class="loading-txt">Cargando menú...</div>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottomBar" onclick="openCart()">
  <div class="bb-left">
    <span class="bb-count" id="bbCount">0</span>
    <span class="bb-label">Ver pedido</span>
  </div>
  <span class="bb-total" id="bbTotal">€0,00</span>
</div>

<!-- CART DRAWER -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <span class="drawer-title">Tu pedido</span>
    <button class="drawer-close" onclick="closeCart()">✕</button>
  </div>
  <div class="drawer-items" id="drawerItems"></div>
  <div class="drawer-footer">
    <div class="total-row">
      <span class="total-label">Total</span>
      <span class="total-val" id="drawerTotal">€0,00</span>
    </div>
    <button class="confirm-btn" id="confirmBtn" onclick="checkout()" disabled>
      Confirmar pedido
    </button>
  </div>
</div>

<!-- SENDING -->
<div class="sending-screen" id="sendingScreen">
  <div class="send-spinner"></div>
  <div class="send-label">Enviando pedido...</div>
</div>

<!-- CONFIRMATION -->
<div class="confirm-screen" id="confirmScreen">
  <div class="confirm-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <div class="confirm-title">Pedido recibido</div>
  <div class="confirm-sub">Tu pedido ha sido enviado al mostrador. Acércate a pagar y recoger.</div>
  <button class="new-order-btn" onclick="newOrder()">Nuevo pedido</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({ databaseURL: "https://kiosco-de-rosi-default-rtdb.firebaseio.com" });
const db = getDatabase(app);

let categories = {}, products = {}, cart = {};

const fmt = n => '€' + Number(n).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');

// ── FIREBASE ──
onValue(ref(db,'categorias'), snap => {
  categories = snap.val() || {};
  renderSidebar();
  renderAllProducts();
});

onValue(ref(db,'productos'), snap => {
  products = snap.val() || {};
  renderAllProducts();
});

// ── SIDEBAR ──
function renderSidebar() {
  const entries = Object.entries(categories);
  const el = document.getElementById('sidebar');
  if (!entries.length) { el.innerHTML = ''; return; }

  el.innerHTML = entries.map(([k,c], i) =>
    `<div class="cat-item ${i===0?'active':''}" id="cat-nav-${k}" onclick="scrollToSection('${k}')">
      <div class="cat-icon">${c.emoji||'📦'}</div>
      <div class="cat-name">${c.name}</div>
    </div>`
  ).join('');
}

// ── PRODUCTS ──
function renderAllProducts() {
  const area = document.getElementById('productsArea');
  const entries = Object.entries(categories);

  if (!entries.length) {
    area.innerHTML = `<div class="loading-screen"><div class="loading-spinner"></div><div class="loading-txt">Cargando menú...</div></div>`;
    return;
  }

  area.innerHTML = entries.map(([k,c]) => {
    const prods = Object.entries(products).filter(([,p])=>p.catId===k);
    const grid = prods.length
      ? `<div class="products-grid">${prods.map(([pid,p]) => productCard(pid, p)).join('')}</div>`
      : `<div class="empty-menu">Sin productos en esta categoría</div>`;
    return `<div class="cat-section" id="section-${k}">
      <div class="cat-section-title">${c.name}</div>
      ${grid}
    </div>`;
  }).join('');

  // Intersection observer to highlight active sidebar item
  setupObserver();
}

function productCard(pid, p) {
  const qty = cart[pid]?.qty || 0;
  const imgEl = p.imgBase64
    ? `<img src="${p.imgBase64}" alt="${p.name}" loading="lazy">`
    : `<div class="product-img-placeholder">🍬</div>`;
  return `<div class="product-card ${qty>0?'in-cart':''}" id="pcard-${pid}">
    <div class="product-img-wrap">
      ${imgEl}
      ${qty>0 ? `<div class="in-cart-badge">${qty}</div>` : ''}
    </div>
    <div class="product-body">
      <div class="product-name">${p.name}</div>
      ${p.desc ? `<div class="product-desc">${p.desc}</div>` : ''}
      <div class="product-footer">
        <div class="product-price">${fmt(p.price)}</div>
        <button class="add-btn" onclick="addToCart('${pid}')">+</button>
      </div>
    </div>
  </div>`;
}

function refreshCard(pid) {
  const p = products[pid]; if (!p) return;
  const el = document.getElementById(`pcard-${pid}`); if (!el) return;
  el.outerHTML = productCard(pid, p);
}

// ── SCROLL SPY ──
function setupObserver() {
  const sections = document.querySelectorAll('.cat-section');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id.replace('section-','');
        document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
        const nav = document.getElementById(`cat-nav-${id}`);
        if (nav) { nav.classList.add('active'); nav.scrollIntoView({block:'nearest'}); }
      }
    });
  }, { root: document.getElementById('productsArea'), threshold: 0.3 });
  sections.forEach(s => obs.observe(s));
}

window.scrollToSection = function(k) {
  const el = document.getElementById(`section-${k}`);
  if (el) el.scrollIntoView({ behavior: 'smooth' });
};

// ── CART ──
window.addToCart = function(k) {
  const prod = products[k]; if (!prod) return;
  if (!cart[k]) cart[k] = { ...prod, id: k, qty: 0 };
  cart[k].qty++;
  refreshCard(k);
  updateCartUI();
};

window.changeQty = function(k, delta) {
  if (!cart[k]) return;
  cart[k].qty += delta;
  if (cart[k].qty <= 0) delete cart[k];
  refreshCard(k);
  updateCartUI();
};

function updateCartUI() {
  const items = Object.values(cart);
  const total = items.reduce((s,i)=>s+i.price*i.qty, 0);
  const count = items.reduce((s,i)=>s+i.qty, 0);

  document.getElementById('cartBadge').textContent = count;
  document.getElementById('bbCount').textContent = count;
  document.getElementById('bbTotal').textContent = fmt(total);
  document.getElementById('drawerTotal').textContent = fmt(total);
  document.getElementById('bottomBar').classList.toggle('visible', count > 0);
  document.getElementById('confirmBtn').disabled = !items.length;

  const el = document.getElementById('drawerItems');
  if (!items.length) {
    el.innerHTML = `<div class="empty-cart-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <p>Tu pedido está vacío</p>
    </div>`;
    return;
  }
  el.innerHTML = items.map(item => {
    const imgEl = item.imgBase64
      ? `<div class="ci-img"><img src="${item.imgBase64}" alt="${item.name}"></div>`
      : `<div class="ci-img">🍬</div>`;
    return `<div class="cart-item">
      ${imgEl}
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-unit">${fmt(item.price)} / ud.</div>
      </div>
      <div class="ci-controls">
        <button class="ci-btn" onclick="changeQty('${item.id}',-1)">−</button>
        <span class="ci-qty">${item.qty}</span>
        <button class="ci-btn" onclick="changeQty('${item.id}',1)">+</button>
      </div>
      <div class="ci-subtotal">${fmt(item.price * item.qty)}</div>
    </div>`;
  }).join('');
}

window.openCart = function() {
  updateCartUI();
  document.getElementById('cartDrawer').classList.add('show');
  document.getElementById('overlay').classList.add('show');
};
window.closeCart = function() {
  document.getElementById('cartDrawer').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
};

window.checkout = async function() {
  const items = Object.values(cart).map(i=>({
    id: i.id, name: i.name, emoji: i.emoji||'🍬',
    imgBase64: i.imgBase64||null,
    price: i.price, qty: i.qty, subtotal: i.price*i.qty
  }));
  const total = items.reduce((s,i)=>s+i.subtotal,0);
  closeCart();
  document.getElementById('sendingScreen').classList.add('show');
  try {
    await push(ref(db,'pedidos'), { items, total, timestamp: Date.now(), estado: 'nuevo' });
    document.getElementById('sendingScreen').classList.remove('show');
    document.getElementById('confirmScreen').classList.add('show');
  } catch(e) {
    document.getElementById('sendingScreen').classList.remove('show');
    alert('Error al enviar el pedido. Comprueba la conexión.');
  }
};

window.newOrder = function() {
  cart = {};
  document.getElementById('confirmScreen').classList.remove('show');
  updateCartUI();
  renderAllProducts();
};

updateCartUI();
</script>
</body>
</html>
